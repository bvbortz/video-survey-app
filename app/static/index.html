<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Quality Survey</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main id="app">
    <!-- Language switcher (always visible) -->
    <div class="langbar" role="group" aria-label="Language / שפה">
      <button id="lang-en" class="lang-btn" type="button">English</button>
      <button id="lang-he" class="lang-btn" type="button">עברית</button>
    </div>

    <!-- Consent -->
    <section id="consent" class="card hidden">
      <h1 id="consent-title"></h1>
      <p id="consent-text"></p>
      <p id="setup-note" class="setup-note"></p>
      <button id="start-btn" class="primary"></button>
    </section>

    <!-- Rating -->
    <section id="rating" class="hidden">
      <div class="progress"><div id="progress-bar"></div></div>
      <p class="counter"><span id="counter"></span></p>
      <p class="prompt"><span id="prompt-label"></span> “<span id="prompt-text"></span>”</p>
      <p id="hint-line" class="hint"></p>

      <div class="stage">
        <figure class="cond">
          <figcaption id="cap-starting-image"></figcaption>
          <img id="cond-image" alt="">
        </figure>
        <div class="videos">
          <div class="vid-col">
            <h2 id="label-video-a"></h2>
            <video id="video-a" controls autoplay muted loop playsinline></video>
            <div class="sliders" id="sliders-a"></div>
          </div>
          <div class="vid-col">
            <h2 id="label-video-b"></h2>
            <video id="video-b" controls autoplay muted loop playsinline></video>
            <div class="sliders" id="sliders-b"></div>
          </div>
        </div>
      </div>

      <div class="flag-row">
        <label class="flag-label">
          <input type="checkbox" id="flag-issue">
          <span id="flag-label-text"></span>
        </label>
        <textarea id="flag-note" class="hidden" rows="2" maxlength="1000"></textarea>
      </div>

      <div class="nav">
        <button id="back-btn" class="secondary"></button>
        <button id="next-btn" class="primary" disabled></button>
        <span id="saving" class="saving hidden"><span class="spinner"></span> <span id="saving-text"></span></span>
      </div>
      <p id="next-hint" class="hint"></p>
    </section>

    <!-- Done -->
    <section id="done" class="card hidden">
      <h1 id="done-title"></h1>
      <p><span id="done-text"></span> <a href="#" id="again"></a></p>
    </section>

    <section id="error" class="card hidden">
      <h1 id="error-title"></h1>
      <p id="error-text"></p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
